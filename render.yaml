services:
  # Unified Web Application (Web + Worker + Reverb)
  - type: web
    name: rescue-platform
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: redis
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: DATABASE_URL
        fromDatabase:
          name: rescue-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rescue-redis
          property: connectionString
      - key: REDIS_CLIENT
        value: predis
      - key: APP_KEY
        sync: false
      # Reverb Config (Internal)
      - key: REVERB_SERVER_PORT
        value: "8080"
      - key: REVERB_HOST
        value: "0.0.0.0"

  # Redis
  - type: redis
    name: rescue-redis
    plan: free
    ipAllowList: []

databases:
  - name: rescue-db
    plan: free
