services:
  # Main Web Application
  - type: web
    name: rescue-platform
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: redis
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: DATABASE_URL
        fromDatabase:
          name: rescue-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rescue-redis
          property: connectionString
      - key: APP_KEY
        sync: false

  # Background Worker
  - type: worker
    name: rescue-worker
    runtime: docker
    plan: free
    dockerCommand: php artisan queue:work --tries=3
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rescue-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rescue-redis
          property: connectionString

  # WebSocket Server (Reverb)
  - type: web
    name: rescue-reverb
    runtime: docker
    plan: free
    dockerCommand: php artisan reverb:start --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rescue-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rescue-redis
          property: connectionString

  # Redis
  - type: redis
    name: rescue-redis
    plan: free
    ipAllowList: []

databases:
  - name: rescue-db
    plan: free
